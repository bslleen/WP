databases:
  - name: writer-portfolio-db
    plan: free
    databaseName: writer_portfolio

services:
  - type: web
    name: writer-portfolio-api
    env: go
    plan: free
    rootDir: backend
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: writer-portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://wp-jet-three.vercel.app
      - key: OWNER_PASSWORD
        value: AAAA18
      - key: PORT
        value: "8080"
